<style>
:root{--navy:#1F3864;--blue:#2E5C9E;--bg:#f4f6fb;--card:#fff;--green:#1E6B2F;--greenbg:#E2EFDA;--red:#9C2A2A;--redbg:#FCE4E4;--amber:#8A6D1A;--amberbg:#FFF3CD;--gray:#6B7280;--line:#d8e0ee;}
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:#152038;line-height:1.5;}
.wrap{max-width:680px;margin:0 auto;padding:16px 14px 70px;}
header{border-bottom:4px solid var(--navy);padding-bottom:9px;margin-bottom:8px;}
h1{font-size:23px;color:var(--navy);margin:0;}
.sub{color:var(--gray);font-size:13.5px;margin:4px 0 0;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:12px 0;box-shadow:0 1px 3px rgba(20,40,80,.05);}
.row{display:flex;gap:10px;flex-wrap:wrap;}
.btn{background:var(--navy);color:#fff;border:none;border-radius:11px;padding:13px 18px;font-size:15px;font-weight:700;cursor:pointer;}
.btn.sec{background:#fff;color:var(--navy);border:1.5px solid var(--navy);}
.btn.wide{display:block;width:100%;margin-top:10px;}
.btn:disabled{opacity:.4;}
.stage{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;margin:8px 0;cursor:pointer;}
.stage:hover{border-color:var(--blue);}
.stage .t{font-weight:800;color:var(--navy);font-size:16px;}
.stage .m{font-size:12.5px;color:var(--gray);}
.mbar{height:6px;background:#e3e9f4;border-radius:6px;overflow:hidden;margin-top:6px;width:120px;}
.mbar>div{height:100%;background:var(--green);}
.pill{display:inline-block;background:#eaf1fb;color:var(--blue);border-radius:999px;padding:2px 11px;font-size:12px;font-weight:700;margin-bottom:8px;}
.word{font-size:30px;font-weight:800;color:var(--navy);}
.pos{font-size:14px;color:var(--gray);font-style:italic;margin-left:8px;font-weight:600;}
.def{font-size:19px;margin:12px 0;}
.sent{font-size:15.5px;color:#39507a;font-style:italic;background:#f6f9ff;border-left:4px solid var(--blue);border-radius:8px;padding:10px 12px;}
.choice{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:13px 15px;margin:8px 0;cursor:pointer;font-size:16px;}
.choice:hover{border-color:var(--blue);}
.choice.correct{background:var(--greenbg);border-color:var(--green);color:var(--green);font-weight:700;}
.choice.wrong{background:var(--redbg);border-color:var(--red);color:var(--red);}
.choice.dim{pointer-events:none;opacity:.97;}
input.fill{width:100%;padding:13px 15px;font-size:17px;border:1.5px solid var(--line);border-radius:11px;}
.fb{border-radius:10px;padding:11px 13px;margin-top:12px;font-size:15px;}
.fb.ok{background:var(--greenbg);color:var(--green);}.fb.no{background:var(--redbg);color:var(--red);}
.prog{font-size:13px;color:var(--gray);font-weight:700;}
.bar{height:7px;background:#e3e9f4;border-radius:6px;overflow:hidden;margin:6px 0 12px;}
.bar>div{height:100%;background:var(--blue);transition:.2s;}
.big{font-size:42px;font-weight:800;color:var(--navy);}
a.link{color:var(--blue);cursor:pointer;font-weight:700;}
.modegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
.mode{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:14px 12px;cursor:pointer;text-align:center;font-weight:700;color:var(--navy);font-size:14.5px;}
.mode:hover{border-color:var(--blue);background:#f0f5ff;}
.mode small{display:block;color:var(--gray);font-weight:500;font-size:11.5px;margin-top:3px;}
.center{text-align:center;}
.flip{min-height:150px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;}
</style>

const EXPL={"advocate":"To advocate is to publicly speak up FOR something or someone — to back it. Synonyms: champion, support, promote. SAT note: as a verb it's usually \"advocate for ___\"; as a noun, \"an advocate\" is a supporter. Memory hook: an adVOCAte uses their VOICE.","undermine":"To undermine is to weaken something gradually, often from underneath. Synonyms: weaken, erode, sabotage. Opposite of strengthen/bolster. Hook: digging a mine UNDER something makes it collapse.","bolster":"To bolster is to strengthen or prop up. Synonyms: reinforce, boost, support. Often \"bolster a claim with evidence.\" Hook: a bolster is a firm pillow that props you up. Opposite: undermine.","nuanced":"Nuanced means showing small, subtle shades of meaning or distinctions. Synonyms: subtle, layered, sophisticated. A \"nuanced argument\" sees more than one side. Opposite: simplistic, black-and-white.","ambiguous":"Ambiguous means having more than one possible meaning; unclear. Synonyms: vague, equivocal. Don't confuse with \"ambivalent\" (mixed feelings). Hook: AMBI = both — it could be read both ways.","arbitrary":"Arbitrary means based on personal whim or chance, not on reason or rules. Synonyms: random, unjustified. A rule with no logic behind it is arbitrary. Opposite: principled, systematic.","plausible":"Plausible means believable or reasonable — though not proven true. Synonyms: credible, convincing. A plausible explanation could be true. Opposite: implausible, far-fetched.","substantiate":"To substantiate is to back something up with evidence or proof. Synonyms: prove, verify, support. You substantiate a claim. Hook: give it SUBSTANCE.","refute":"To refute is to prove that something is false. Synonyms: disprove, rebut, debunk. Note: it means actually disproving with evidence, not just disagreeing. Opposite: confirm, prove.","concede":"To concede is to admit something is true, usually reluctantly. Synonyms: acknowledge, grant, yield. \"Even critics concede...\" signals giving a point to the other side.","pervasive":"Pervasive means spread throughout everything; everywhere. Synonyms: widespread, prevalent, ubiquitous. Hook: it PERVADES every corner. Often used of influences, attitudes, problems.","mitigate":"To mitigate is to make something bad less severe. Synonyms: lessen, reduce, ease, alleviate. You mitigate risk/damage/harm. Opposite: exacerbate (make worse).","exacerbate":"To exacerbate is to make a bad situation worse. Synonyms: worsen, aggravate, intensify. Opposite: mitigate, alleviate. Hook: it scrapes a problem raw.","scrutinize":"To scrutinize is to examine very closely and critically. Synonyms: inspect, analyze, examine carefully. Hook: look at it under a microscope. Noun: scrutiny.","tenuous":"Tenuous means weak, thin, or flimsy — easily broken. Synonyms: shaky, fragile, slight. A \"tenuous link\" is barely there. Opposite: robust, strong.","inherent":"Inherent means existing as a natural, built-in part of something. Synonyms: intrinsic, innate, essential. \"Risks inherent in X\" = risks that come with X by nature. Opposite: external.","superfluous":"Superfluous means more than is needed; unnecessary extra. Synonyms: excessive, redundant, surplus. Hook: SUPER-fluous = overflowing. Opposite: essential.","paradox":"A paradox is a statement or situation that seems contradictory but may be true. Synonyms: contradiction, puzzle. Adjective: paradoxical. Example: \"less is more.\"","candor":"Candor is honesty and openness, especially in saying hard truths. Synonyms: frankness, directness, sincerity. Adjective: candid. Opposite: evasiveness.","skepticism":"Skepticism is a doubting, questioning attitude — not accepting claims without proof. Synonyms: doubt, wariness. Adjective: skeptical. Opposite: credulity (believing too easily).","pragmatic":"Pragmatic means practical and focused on what actually works, not on theory or ideals. Synonyms: practical, realistic, sensible. Opposite: idealistic, impractical.","ubiquitous":"Ubiquitous means found everywhere at once. Synonyms: omnipresent, pervasive. Hook: ubiquitous like Wi-Fi. Opposite: rare, scarce.","anomaly":"An anomaly is something that breaks the normal pattern; an exception. Synonyms: irregularity, oddity, outlier. Adjective: anomalous. Opposite: the norm.","proliferate":"To proliferate is to increase or spread rapidly. Synonyms: multiply, mushroom, spread. Hook: think of cells proliferating. Opposite: dwindle, decline.","facilitate":"To facilitate is to make a process easier or smoother. Synonyms: ease, enable, assist. A facilitator helps things happen. Opposite: hinder, impede.","hinder":"To hinder is to slow down or get in the way of progress. Synonyms: impede, obstruct, hamper. Hook: something BEHIND (hind) holds you back. Opposite: facilitate, help.","curtail":"To curtail is to cut short or reduce. Synonyms: shorten, restrict, trim, scale back. Hook: cut the TAIL off. You curtail spending, freedoms, activities.","endorse":"To endorse is to publicly approve or support. Synonyms: back, support, vouch for, sanction. Celebrities endorse products; experts endorse ideas.","empirical":"Empirical means based on observation, experiment, or real data — not just theory. Synonyms: observed, experimental, evidence-based. Opposite: theoretical, speculative.","derivative":"(adj.) Derivative means copied from something else; unoriginal. Synonyms: imitative, unoriginal. A derivative film borrows from older ones. Opposite: original, innovative.","inevitable":"Inevitable means certain to happen; unavoidable. Synonyms: unavoidable, inescapable, bound to happen. Opposite: avoidable, preventable.","meticulous":"Meticulous means extremely careful about small details. Synonyms: thorough, precise, painstaking. Hook: a meticulous person checks everything twice. Opposite: careless, sloppy.","redundant":"Redundant means repeated unnecessarily; saying the same thing twice. Synonyms: repetitive, superfluous. Example: \"ATM machine\" (the M already means \"machine\"). Opposite: concise.","viable":"Viable means workable and able to succeed or survive. Synonyms: feasible, practical, workable. A viable plan can actually work. Opposite: unworkable, doomed.","prudent":"Prudent means wise and careful, thinking ahead to avoid risk. Synonyms: sensible, cautious, judicious. Noun: prudence. Opposite: reckless, rash.","indifferent":"Indifferent means not caring one way or the other. Synonyms: uninterested, apathetic, unconcerned. Note: it's NOT the same as fair/neutral. Opposite: passionate, interested.","reconcile":"To reconcile is to make two conflicting things fit together (or to restore a friendship). Synonyms: harmonize, settle, square. \"Reconcile two accounts\" = make them agree.","perpetuate":"To perpetuate is to keep something going, often a bad thing. Synonyms: prolong, sustain, maintain. You perpetuate a myth/stereotype/cycle. Hook: make it PERPETUAL.","diminish":"To diminish is to make or become smaller or weaker. Synonyms: decrease, lessen, shrink, reduce. Opposite: increase, augment, grow.","attribute":"(v.) To attribute is to say what caused something or who made it. Synonyms: credit, ascribe, assign. \"Attribute the decline TO overfishing\" = name the cause. (As a noun: a quality or trait.)","discern":"To discern is to detect or tell apart, often something subtle. Synonyms: perceive, distinguish, make out. Adjective: discerning (sharp-eyed). Hook: discern the difference.","cohesive":"Cohesive means well-unified, with parts that stick together logically. Synonyms: unified, connected, integrated. A cohesive essay flows. Opposite: disjointed, scattered.","inconsequential":"Inconsequential means unimportant; having no real effect. Synonyms: trivial, negligible, insignificant. Hook: of no CONSEQUENCE. Opposite: significant, crucial.","ameliorate":"To ameliorate is to make a bad situation better. Synonyms: improve, ease, remedy, mitigate. Hook: a-MEL-iorate = make it mellower. Opposite: worsen, exacerbate.","innocuous":"Innocuous means harmless and inoffensive. Synonyms: harmless, benign, mild. An innocuous comment won't hurt anyone. Opposite: harmful, dangerous.","ambivalent":"Ambivalent means having mixed, conflicting feelings about something. Synonyms: torn, undecided, of two minds. Don't confuse with \"ambiguous\" (unclear meaning). Hook: AMBI = both feelings at once.","contempt":"Contempt is intense disrespect or scorn — looking down on someone or something. Synonyms: scorn, disdain, derision. Opposite: admiration, respect.","quotidian":"Quotidian means everyday and ordinary. Synonyms: daily, routine, commonplace, mundane. Hook: relates to a daily \"quota.\" Opposite: extraordinary, special.","overt":"Overt means open and obvious, not hidden. Synonyms: open, evident, blatant. Opposite: covert (hidden), subtle. Hook: overt is out in the OPEN.","sanction":"Tricky word: sanction can mean to officially APPROVE, OR a PENALTY (like economic sanctions). Context decides. \"A sanctioned event\" = approved; \"sanctions on a country\" = penalties.","postulate":"To postulate is to assume or put something forward as true, as a starting point. Synonyms: assume, propose, posit, hypothesize. Common in science and logic.","antagonistic":"Antagonistic means hostile or actively opposed. Synonyms: hostile, adversarial, combative. Noun: antagonist (the opponent). Opposite: friendly, cooperative.","supersede":"To supersede is to replace something with a newer or better version. Synonyms: replace, supplant, override. The new rule supersedes the old one. Hook: it sits ABOVE (super) and takes over.","preclude":"To preclude is to prevent or rule out in advance. Synonyms: prevent, rule out, bar. \"A tight budget precludes a vacation\" = makes it impossible.","volatile":"Volatile means unstable and quick to change (or to blow up). Synonyms: unstable, unpredictable, erratic. Volatile prices/tempers. Opposite: stable, steady.","autonomous":"Autonomous means self-governing or independent. Synonyms: independent, self-ruling, self-directed. An autonomous region or car runs itself. Opposite: dependent, controlled.","fluctuate":"To fluctuate is to rise and fall irregularly. Synonyms: vary, waver, swing. Prices and temperatures fluctuate. Opposite: stay constant, stabilize.","comprehensive":"Comprehensive means complete and covering everything. Synonyms: thorough, all-inclusive, full. A comprehensive review leaves nothing out. Opposite: partial, limited.","compelling":"Compelling means so convincing or interesting that it's hard to resist. Synonyms: persuasive, convincing, gripping. A compelling argument or story. Opposite: weak, unconvincing.","coherent":"Coherent means clear and logically connected. Synonyms: logical, consistent, unified. A coherent argument makes sense step by step. Opposite: incoherent, disjointed.","disparate":"Disparate means very different in kind; not really comparable. Synonyms: distinct, dissimilar, varied. \"Disparate backgrounds\" = very different ones. Opposite: similar, uniform.","negligible":"Negligible means so small it can be ignored. Synonyms: tiny, insignificant, trivial. Hook: you can NEGLECT it. Opposite: significant, substantial.","intrinsic":"Intrinsic means belonging to something by its very nature; essential. Synonyms: inherent, innate, built-in. \"Intrinsic value\" = value in itself. Opposite: extrinsic, external.","speculative":"Speculative means based on guessing rather than solid evidence. Synonyms: theoretical, conjectural, unproven. Opposite: empirical, proven.","didactic":"Didactic means meant to teach — sometimes preachy about a lesson or moral. Synonyms: instructive, educational, moralizing. A didactic story pushes a clear lesson.","aesthetic":"Aesthetic relates to beauty and art, or to how something looks. Synonyms: artistic, visual. \"Aesthetic appeal\" = how attractive it is. (As a noun: a style or look.)","reverence":"Reverence is deep respect, almost worship. Synonyms: awe, admiration, veneration. Adjective: reverent. Opposite: contempt, disdain.","nostalgia":"Nostalgia is a sentimental longing for the past. Synonyms: wistfulness, longing. Adjective: nostalgic. Old songs and photos trigger nostalgia.","apprehension":"Apprehension is anxiety or worry about something ahead. Synonyms: dread, unease, foreboding. (It can also mean an arrest.) Opposite: confidence, calm.","candid":"Candid means honest, direct, and open. Synonyms: frank, forthright, straightforward. A candid answer doesn't sugarcoat. Noun: candor.","yield":"Yield has two senses: to PRODUCE (a result or crop) or to GIVE WAY (surrender, let pass). Context decides. \"The experiment yielded results\" = produced; \"yield to traffic\" = give way.","foster":"To foster is to encourage the growth or development of something. Synonyms: nurture, cultivate, promote. You foster creativity or teamwork. (Also: foster care.)","augment":"To augment is to add to and increase. Synonyms: boost, supplement, enlarge. \"Augment income with a second job.\" Opposite: diminish, reduce.","alleviate":"To alleviate is to ease or lessen pain or a problem. Synonyms: relieve, ease, soothe, mitigate. You alleviate pain, stress, or poverty. Opposite: worsen.","impede":"To impede is to block or slow progress. Synonyms: obstruct, hinder, hamper. Noun: impediment (a blockage). Opposite: facilitate, aid.","corroborate":"To corroborate is to support a claim with additional evidence. Synonyms: confirm, back up, verify, substantiate. A second witness corroborates a story.","elucidate":"To elucidate is to make something clear; to explain. Synonyms: clarify, explain, illuminate. Hook: shed LUCID (clear) light on it. Opposite: obscure, confuse.","tentative":"Tentative means not final — hesitant or provisional. Synonyms: provisional, unconfirmed, hesitant. A tentative plan could still change. Opposite: definite, firm.","robust":"Robust means strong, healthy, and well-supported. Synonyms: sturdy, vigorous, solid. \"Robust evidence\" or \"robust economy.\" Opposite: weak, fragile, tenuous.","unprecedented":"Unprecedented means never seen or done before. Synonyms: new, novel, record-breaking. Hook: no PRECEDENT exists for it.","conventional":"Conventional means traditional and standard — following the usual way. Synonyms: traditional, customary, orthodox. Opposite: unconventional, innovative.","marginal":"Marginal means small, minor, or on the edge. Synonyms: slight, minimal, peripheral. \"A marginal difference\" = barely any. Opposite: substantial, central.","synthesize":"To synthesize is to combine separate parts or ideas into a whole. Synonyms: integrate, combine, blend. \"Synthesize sources\" = pull them together. (SAT skill: rhetorical synthesis.)","enumerate":"To enumerate is to list things one by one. Synonyms: list, itemize, spell out, count off. Hook: \"numerate\" = number them in order."};
const STAGE_SIZE=14;
const STAGES=[];
for(let i=0;i<WORDS.length;i+=STAGE_SIZE)STAGES.push(WORDS.slice(i,i+STAGE_SIZE));

/* ===== progress ===== */
let P={};try{P=JSON.parse(localStorage.getItem('satvocab')||'{}')}catch(e){P={}}
function save(){try{localStorage.setItem('satvocab',JSON.stringify(P))}catch(e){}}
function rec(w,ok){const k=P[w]||{s:0,c:0};k.s++;if(ok)k.c++;P[w]=k;save();}
function mastery(w){const k=P[w];if(!k||k.s===0)return 0;return Math.round(k.c/k.s*100);}
function stageMastery(arr){const m=arr.map(x=>mastery(x[0]));return Math.round(m.reduce((a,b)=>a+b,0)/arr.length);}

/* ===== util ===== */
const app=document.getElementById('app');
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const norm=s=>(s||'').toString().trim().toLowerCase();
function cloze(s,w){return s.replace(new RegExp('\\b'+w+'\\b','i'),'______');}

/* ===== home ===== */
function home(){
  let h=`<div class="card"><div style="font-weight:800;color:var(--navy);font-size:16px">Pick a stage</div>
  <div class="sub" style="margin-bottom:8px">${WORDS.length} words total · ${STAGES.length} stages of ${STAGE_SIZE}. Master one before the next.</div>`;
  STAGES.forEach((arr,i)=>{const m=stageMastery(arr);
    h+=`<button class="stage" onclick="stageMenu(${i})"><span><span class="t">Stage ${i+1}</span><div class="m">words ${i*STAGE_SIZE+1}–${i*STAGE_SIZE+arr.length}</div><div class="mbar"><div style="width:${m}%"></div></div></span><span class="m">${m}% ›</span></button>`;});
  h+=`<button class="btn wide sec" onclick="reviewMissed()">🔁 Review my missed words</button></div>`;
  const coachOn=coachConnected();
  h+=`<div class="card" style="display:flex;justify-content:space-between;align-items:center">
    <div><b style="color:var(--navy)">🤖 Coach chatbot</b><div class="sub">${coachOn?'Connected — tap “Ask the coach” on any word.':'Not connected yet — tap Set up and paste your Gemini key.'}</div></div>
    <button class="btn sec" onclick="setupTutor()">${coachOn?'Edit':'⚙︎ Set up'}</button></div>`;
  app.innerHTML=h;
}

/* ===== stage menu (choose mode) ===== */
let CUR=null; // {words:[], mode:''}
function stageMenu(i){
  const arr=STAGES[i];
  app.innerHTML=`<div class="card"><span class="pill">Stage ${i+1}</span>
    <div style="font-weight:800;color:var(--navy);font-size:16px">Choose how to practice</div>
    <div class="sub" style="margin-bottom:8px">${arr.length} words · ${stageMastery(arr)}% mastered</div>
    <div class="modegrid">
      <div class="mode" onclick="start(${i},'flash')">🃏 Flashcards<small>see word → flip for meaning</small></div>
      <div class="mode" onclick="start(${i},'mean')">📖 Meaning<small>word → pick the definition</small></div>
      <div class="mode" onclick="start(${i},'word')">🔤 Find the word<small>definition → pick the word</small></div>
      <div class="mode" onclick="start(${i},'recall')">⌨️ Recall<small>type the word from its meaning</small></div>
      <div class="mode" onclick="start(${i},'context')">📝 In context<small>fill the blank in a sentence</small></div>
    </div>
    <button class="btn wide" onclick="start(${i},'mix')">🎯 Mixed review (all modes)</button>
    <div class="center" style="margin-top:12px"><a class="link" onclick="home()">⌂ Back</a></div></div>`;
}

/* ===== quiz engine ===== */
function start(i,mode){CUR={words:shuffle(STAGES[i]),mode,i:0,correct:0,missed:[]};render();}
function reviewMissed(){
  const miss=WORDS.filter(x=>{const k=P[x[0]];return k&&k.s>0&&k.c/k.s<0.7;});
  if(!miss.length){app.innerHTML=`<div class="card center"><div class="big">🎉</div><div>No weak words yet — practice a stage first, and the ones you miss will collect here.</div><button class="btn wide" onclick="home()">Back</button></div>`;return;}
  CUR={words:shuffle(miss),mode:'mix',i:0,correct:0,missed:[]};render();
}

function pickMode(){return CUR.mode==='mix'?shuffle(['flash','mean','word','recall','context'])[0]:CUR.mode;}

function render(){
  if(CUR.i>=CUR.words.length)return summary();
  const word=CUR.words[CUR.i];const mode=pickMode();CUR._m=mode;
  const pct=Math.round(CUR.i/CUR.words.length*100);
  let body='';
  if(mode==='flash'){
    body=`<div class="flip" id="flip" onclick="flipCard()">
      <div class="word">${word[0]}<span class="pos">${word[1]}</span></div>
      <div class="sub" style="margin-top:10px">tap to flip</div></div>
      <div id="back" style="display:none"><div class="def">${word[2]}</div><div class="sent">${cloze(word[3],word[0]).replace('______','<b>'+word[0]+'</b>')}</div>
      <button class="btn sec wide" onclick="askCoach()">🤖 Ask the coach about this</button>
      <div class="row" style="margin-top:10px"><button class="btn sec" style="flex:1" onclick="flashRate(false)">Review again</button><button class="btn" style="flex:1" onclick="flashRate(true)">I knew it ✓</button></div></div>`;
  } else if(mode==='mean'){
    const opts=makeOpts(word,2);body=mc(`What does <b>${word[0]}</b> <span class="pos">${word[1]}</span> mean?`,opts,word[2]);
  } else if(mode==='word'){
    const opts=makeOpts(word,0);body=mc(`Which word means: <i>${word[2]}</i>?`,opts,word[0]);
  } else if(mode==='recall'){
    body=`<div class="qtext">Type the word that means:</div><div class="def">${word[2]} <span class="pos">(${word[1]})</span></div>
      <input class="fill" id="fillin" placeholder="the word" autocomplete="off" autocapitalize="none"><button class="btn wide" onclick="checkFill('${word[0]}')">Check</button>`;
  } else { // context — SAT-style sentence completion
    const opts=makeOpts(word,0);body=`<div class="qtext" style="font-size:16px;margin-bottom:6px">Which choice completes the text with the most logical and precise word?</div><div class="sent" style="font-style:normal;margin-bottom:8px">${cloze(word[3],word[0])}</div>${optButtons(opts,word[0])}`;
  }
  app.innerHTML=`<div class="card"><div class="prog">${CUR.i+1} / ${CUR.words.length} &nbsp;·&nbsp; Score ${CUR.correct}</div>
    <div class="bar"><div style="width:${pct}%"></div></div>
    <span class="pill">${({flash:'Flashcard',mean:'Meaning',word:'Find the word',recall:'Recall',context:'In context'})[mode]}</span>
    <div id="qa">${body}</div></div><div class="center"><a class="link" onclick="home()">⌂ Menu</a></div>`;
  if(mode==='recall'){const f=document.getElementById('fillin');f.focus();f.addEventListener('keydown',e=>{if(e.key==='Enter')checkFill(word[0]);});}
}

function makeOpts(word,idx){ // idx 0 -> options are words, 2 -> options are definitions
  const others=shuffle(WORDS.filter(x=>x[0]!==word[0])).slice(0,3);
  const opts=shuffle([word,...others]).map(x=>idx===0?x[0]:x[2]);
  return opts;
}
function mc(q,opts,correctText){return `<div class="qtext" style="font-size:17px;margin-bottom:6px">${q}</div>${optButtons(opts,correctText)}`;}
function optButtons(opts,correct){
  return opts.map(o=>`<button class="choice" onclick="pick(this,'${enc(o)}','${enc(correct)}')">${o}</button>`).join('');
}
const enc=s=>String(s).replace(/'/g,"\\'");

function pick(btn,chosen,correct){
  const ok=norm(chosen)===norm(correct);
  const word=CUR.words[CUR.i];
  [...document.querySelectorAll('.choice')].forEach(b=>{b.classList.add('dim');
    if(norm(b.textContent)===norm(correct))b.classList.add('correct');});
  if(!ok)btn.classList.add('wrong');
  afterAnswer(ok,word,correct);
}
function checkFill(w){
  const val=document.getElementById('fillin').value;const ok=norm(val)===norm(w);
  document.getElementById('fillin').disabled=true;
  afterAnswer(ok,CUR.words[CUR.i],w,true);
}
function flipCard(){document.getElementById('flip').style.display='none';document.getElementById('back').style.display='block';}
function flashRate(ok){const word=CUR.words[CUR.i];rec(word[0],ok);if(ok)CUR.correct++;else CUR.missed.push(word);CUR.i++;render();}

function afterAnswer(ok,word,correct,fill){
  rec(word[0],ok);if(ok)CUR.correct++;else CUR.missed.push(word);
  const qa=document.getElementById('qa');
  const extra=document.createElement('div');
  const ex=EXPL[word[0]]||(word[2]+'.');
  const expStyle="margin-top:10px;background:#f6f9ff;border-left:4px solid var(--blue);border-radius:8px;padding:12px 14px;font-size:14.5px;line-height:1.55";
  extra.innerHTML=`<div class="fb ${ok?'ok':'no'}">${ok?'✓ Correct':'✗ Not quite — the answer is '+word[0]}</div>
    <div style="${expStyle}">
      <div style="font-weight:800;color:var(--navy);font-size:16px">${word[0]} <span class="pos">${word[1]}</span></div>
      <div style="margin:4px 0 9px;color:var(--gray)">${word[2]}</div>
      <div>${ex}</div>
      <div style="margin-top:9px"><b style="color:var(--blue)">In a sentence:</b> <i>${cloze(word[3],word[0]).replace('______','<b>'+word[0]+'</b>')}</i></div>
      <div style="margin-top:9px;color:var(--gray);font-size:13px">Still unsure? Tap “Ask the coach” — it already knows this word and will go further.</div>
    </div>
    <button class="btn sec wide" onclick="askCoach()">🤖 Ask the coach about this</button>
    <button class="btn wide" id="nx">${CUR.i+1>=CUR.words.length?'See results':'Next'}</button>`;
  qa.appendChild(extra);
  document.getElementById('nx').onclick=()=>{CUR.i++;render();};
}

function summary(){
  const tot=CUR.words.length,pct=Math.round(CUR.correct/Math.max(tot,1)*100);
  let h=`<div class="card center"><div class="big">${CUR.correct}/${tot}</div>
    <div class="sub">${pct}% ${pct>=85?'— mastered! 🎉':pct>=60?'— almost; review the misses':'— keep going, the misses are the point'}</div>
    <div class="row" style="justify-content:center;margin-top:14px">`;
  if(CUR.missed.length)h+=`<button class="btn" onclick="retry()">Retry ${CUR.missed.length} missed</button>`;
  h+=`<button class="btn sec" onclick="home()">Stages</button></div></div>`;
  if(CUR.missed.length){h+=`<div class="card"><div style="font-weight:800;color:var(--red);margin-bottom:6px">Words to review</div>`;
    CUR.missed.forEach(w=>h+=`<div style="padding:7px 0;border-top:1px solid var(--line)"><b style="color:var(--navy)">${w[0]}</b> <span class="pos">${w[1]}</span> — ${w[2]}</div>`);
    h+=`</div>`;}
  app.innerHTML=h;
}
function retry(){CUR={words:shuffle(CUR.missed),mode:CUR.mode,i:0,correct:0,missed:[]};render();}

/* ===== Coach chatbot (Gemini via your Worker) ===== */
function getWorker(){try{return localStorage.getItem('coach_url')||''}catch(e){return ''}}
function getKey(){try{return localStorage.getItem('gemini_key')||''}catch(e){return ''}}
function coachConnected(){return !!(getWorker()||getKey());}
var COACH_SYS="You are Coach, a patient SAT vocabulary tutor for one student. Help with the exact word provided (its meaning, usage, why an answer choice was wrong, or more example sentences). Keep replies short, friendly, and plain text. If asked something off-topic, gently steer back to studying.";
var GEMINI_MODEL="gemini-2.5-flash";
function setupTutor(){
  const k=prompt("Paste your Gemini API key — it saves on this device, so you paste it once.\nGet one free at aistudio.google.com → \"Get API key\".\n\nLeave blank to clear.",getKey());
  if(k!==null){try{localStorage.setItem('gemini_key',k.trim())}catch(e){}}
  if(k&&k.trim()){alert("Saved — the 🤖 coach is now active.");home();return;}
  alert("Cleared.");home();
}
let CHAT={ctx:null,msgs:[]};
function askCoach(){
  const w=CUR.words[CUR.i];
  CHAT={ctx:{word:w[0],pos:w[1],def:w[2],sent:w[3],expl:EXPL[w[0]]||''},msgs:[]};
  openChat();
}
function openChat(){
  let ov=document.getElementById('chatov');
  if(!ov){ov=document.createElement('div');ov.id='chatov';document.body.appendChild(ov);}
  ov.setAttribute('style','position:fixed;inset:0;background:rgba(20,30,55,.45);display:flex;align-items:flex-end;justify-content:center;z-index:99;');
  ov.innerHTML=`<div style="background:#fff;width:100%;max-width:680px;border-radius:18px 18px 0 0;max-height:85vh;display:flex;flex-direction:column">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)">
      <b style="color:var(--navy)">🤖 Coach — "${CHAT.ctx.word}"</b>
      <span onclick="document.getElementById('chatov').remove()" style="cursor:pointer;font-size:22px;color:var(--gray)">×</span></div>
    <div id="chatmsgs" style="flex:1;overflow:auto;padding:12px 16px"></div>
    <div style="display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line)">
      <input id="chatin" class="fill" placeholder="Ask about this word…" autocapitalize="none" style="flex:1">
      <button class="btn" onclick="sendChat()">Send</button></div></div>`;
  if(!CHAT.msgs.length){addMsg('assistant',coachConnected()?`Ask me anything about “${CHAT.ctx.word}” — what it means, how it's used, why a choice was wrong, or for more example sentences.`:`The coach isn't connected yet. On the home screen tap “⚙︎ Set up” and paste your Gemini key. Until then, here's the definition: ${CHAT.ctx.word} — ${CHAT.ctx.def}.`);}
  renderChat();
}
function addMsg(role,text){CHAT.msgs.push({role,text});}
function renderChat(){
  const box=document.getElementById('chatmsgs');if(!box)return;
  box.innerHTML=CHAT.msgs.map(m=>{
    const me=m.role==='user';
    return `<div style="margin:8px 0;display:flex;justify-content:${me?'flex-end':'flex-start'}">
      <div style="max-width:85%;padding:9px 12px;border-radius:12px;font-size:14.5px;white-space:pre-wrap;background:${me?'var(--navy)':'#eef3fb'};color:${me?'#fff':'#1a2740'}">${m.text}</div></div>`;
  }).join('');
  box.scrollTop=box.scrollHeight;
}
async function sendChat(){
  const inp=document.getElementById('chatin');const text=(inp.value||'').trim();if(!text)return;
  const url=getWorker(),key=getKey();
  addMsg('user',text);inp.value='';
  if(!url&&!key){addMsg('assistant','Set up the coach first: home screen → ⚙︎ Set up → paste your Gemini key.');renderChat();return;}
  addMsg('assistant','…');renderChat();
  const hist=CHAT.msgs.filter(m=>m.text!=='…').slice(0,-1).map(m=>({role:m.role,text:m.text}));
  const ctxLine=`The student is studying the SAT word "${CHAT.ctx.word}" (${CHAT.ctx.pos}), which means: ${CHAT.ctx.def}. Example sentence: ${CHAT.ctx.sent}. Study note already shown to the student: ${CHAT.ctx.expl}`;
  try{
    let reply;
    if(url){
      const r=await fetch(url.replace(/\/+$/,'')+'/tutor',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({question:{subtopic:'Vocabulary (words in context)',text:ctxLine,correct:CHAT.ctx.word,explanation:CHAT.ctx.def},history:hist,message:text})});
      const d=await r.json();reply=d.reply||'(no reply)';
    }else{
      const contents=[{role:'user',parts:[{text:COACH_SYS+'\n\n'+ctxLine}]},{role:'model',parts:[{text:'Ready to help with this word.'}]}];
      hist.forEach(m=>contents.push({role:m.role==='assistant'?'model':'user',parts:[{text:m.text}]}));
      contents.push({role:'user',parts:[{text:text}]});
      const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+GEMINI_MODEL+':generateContent?key='+encodeURIComponent(key),
        {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents,generationConfig:{temperature:0.4,maxOutputTokens:500}})});
      const d=await r.json();
      reply=((d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts)||[]).map(p=>p.text).join('')||(d.error&&d.error.message?'Gemini error: '+d.error.message:'(no reply)');
    }
    CHAT.msgs[CHAT.msgs.length-1]={role:'assistant',text:reply};
  }catch(e){CHAT.msgs[CHAT.msgs.length-1]={role:'assistant',text:'Could not reach the coach. Check your key / internet.'};}
  renderChat();
}

home();
</script>
